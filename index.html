<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>

  <meta name="theme-color" content="#07070a"/>
  <meta name="description" content="Track workouts, monthly targets, standings, and history with Lift Log."/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Lift Log"/>
  <link rel="manifest" href="./manifest.webmanifest"/>
  <link rel="icon" href="./icon.svg" type="image/svg+xml"/>
  <link rel="apple-touch-icon" href="./icon-512.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>

  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#07070a; --s1:#0e0e12; --s2:#15151a; --s3:#1c1c23;
      --border:#22222e; --border2:#2e2e3c;
      --text:#f0f0f8; --muted:#65657a; --muted2:#3e3e52;
      --green:#1fce65; --green-bg:#081a10; --green-dim:#0f3020;
      --amber:#f0a500; --amber-bg:#1e1400; --amber-dim:#2e1f00;
      --red:#e84545; --red-bg:#1a0808; --red-dim:#2e1010;
      --blue:#5b8def; --gold:#f5c842; --r:11px;
    }
    body { background:var(--bg); color:var(--text); font-family:'Outfit',sans-serif; min-height:100vh; -webkit-font-smoothing:antialiased; overflow-x:hidden; }
    button { cursor:pointer; border:none; font-family:inherit; transition:all .15s; -webkit-tap-highlight-color:transparent; }
    input, select { font-family:inherit; }
    * { scrollbar-width:thin; scrollbar-color:var(--border2) transparent; }
    @keyframes fadeUp  { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeIn  { from{opacity:0} to{opacity:1} }
    @keyframes popIn   { from{opacity:0;transform:scale(.94)} to{opacity:1;transform:scale(1)} }
    @keyframes glow    { 0%,100%{box-shadow:0 0 0 0 rgba(31,206,101,.25)} 50%{box-shadow:0 0 22px 5px rgba(31,206,101,.1)} }
    @keyframes spin    { to{transform:rotate(360deg)} }
    .fu  { animation:fadeUp .35s ease both; }
    .fu2 { animation:fadeUp .35s .06s ease both; }
    .fu3 { animation:fadeUp .35s .12s ease both; }
    .fu4 { animation:fadeUp .35s .18s ease both; }
    .fu5 { animation:fadeUp .35s .24s ease both; }
    .pi  { animation:popIn .22s cubic-bezier(.34,1.4,.64,1) both; }
    .overlay { position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(10px);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .18s ease; }
    .modal { background:var(--s1);border:1px solid var(--border2);border-radius:18px;width:100%;max-width:460px;padding:28px 24px;animation:popIn .22s cubic-bezier(.34,1.4,.64,1);max-height:90vh;overflow-y:auto; }
    .tab { padding:6px 14px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid transparent;color:var(--muted);background:transparent;letter-spacing:.01em; }
    .tab.on { background:var(--s2);border-color:var(--border);color:var(--text); }
    .mono { font-family:'JetBrains Mono',monospace; }
    .lbl { font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;display:block;margin-bottom:5px; }
    input[type="date"] { color-scheme:dark; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter:invert(.5); }
    .spinner { width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite; }
    .card { background:var(--s1);border:1px solid var(--border);border-radius:var(--r); }
    .install-banner { position:fixed;left:16px;right:16px;bottom:16px;z-index:160;display:flex;justify-content:center;pointer-events:none; }
    .install-card { width:min(100%,460px);padding:14px 16px;border-radius:16px;background:rgba(14,14,18,.96);border:1px solid rgba(91,141,239,.28);box-shadow:0 20px 50px rgba(0,0,0,.35);backdrop-filter:blur(14px);pointer-events:auto; }
    .install-actions { display:flex;gap:10px;margin-top:12px; }
    .install-btn { flex:1;min-height:42px;border-radius:11px;font-size:13px;font-weight:800; }
    .install-btn.primary { background:var(--green);color:#04110a; }
    .install-btn.secondary { background:transparent;color:var(--muted);border:1px solid var(--border2); }
    .sync-pill { display:inline-flex;align-items:center;gap:7px;padding:6px 10px;border-radius:999px;background:rgba(14,14,18,.86);border:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted); }
    .sync-dot { width:7px;height:7px;border-radius:50%;background:var(--blue);box-shadow:0 0 0 0 rgba(91,141,239,.35);animation:glow 1.8s infinite; }
    .sync-ok { color:var(--green); }
    .sync-error { color:var(--red); }
    .icon-btn { width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;border-radius:999px;background:var(--s2);border:1px solid var(--border);color:var(--muted);font-size:15px;line-height:1;flex-shrink:0; }
    .icon-btn:disabled { opacity:.55; cursor:default; }
    .spin-icon { display:inline-block; animation:spin .8s linear infinite; }

    /* ── MOBILE STYLES ── */
    @media (max-width: 768px) {
      .desktop-only { display:none !important; }
      .mobile-stack { flex-direction:column !important; }
      .mobile-full { width:100% !important; max-width:100% !important; }
      .mobile-grid-1 { grid-template-columns:1fr !important; }
      .mobile-grid-2 { grid-template-columns:1fr 1fr !important; }
      .mobile-p { padding:12px !important; }
      .mobile-scroll { overflow-x:auto !important; -webkit-overflow-scrolling:touch; }
      .nav-label { display:none; }
      .nav-icon { display:block !important; }
      .install-banner { left:12px; right:12px; bottom:12px; }
      .install-actions { flex-direction:column; }
      .mobile-nav-shell { position:sticky;top:0;z-index:100;background:rgba(7,7,10,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border); }
      .mobile-bottom-nav { position:fixed;left:0;right:0;bottom:0;z-index:140;padding:10px 12px calc(10px + env(safe-area-inset-bottom));background:linear-gradient(to top,rgba(7,7,10,.98),rgba(7,7,10,.9));backdrop-filter:blur(18px);border-top:1px solid rgba(34,34,46,.95); }
      .mobile-bottom-nav-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:560px;margin:0 auto; }
      .mobile-tab { min-height:54px;border-radius:14px;background:var(--s1);border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--muted); }
      .mobile-tab.on { color:var(--text);border-color:rgba(31,206,101,.45);background:linear-gradient(180deg,rgba(31,206,101,.14),rgba(14,14,18,.94)); }
    }
    @media (min-width: 769px) {
      .mobile-only { display:none !important; }
      .nav-icon { display:none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">

const NAMES         = ["Aadhil","Isira","Rahul","Kisal","Rishane","Deyhan","Aysha","Nishara"];
const WORKOUT_TYPES = ["Gym","Run","Sport","Hike","Other"];
const MIN_TARGET    = 12;
const TODAY         = new Date();
const CUR_MONTH     = TODAY.getMonth();
const CUR_YEAR      = TODAY.getFullYear();
const DAYS_IN_MON   = new Date(CUR_YEAR, CUR_MONTH+1, 0).getDate();
const DAY_OF_MON    = TODAY.getDate();
const MONTH_NAMES   = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const AVATAR_COLORS = ["#5b8def","#22d46c","#f5a623","#f04f4f","#ec4899","#14b8a6","#f97316","#a78bfa"];
const avatarColor   = n => AVATAR_COLORS[NAMES.indexOf(n) % AVATAR_COLORS.length];
const WORKOUT_ICONS = { Gym:"🏋️", Run:"🏃", Sport:"⚽", Hike:"🥾", Other:"💪" };

const localISO = d => {
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,"0"), day=String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
};
const TODAY_ISO = localISO(TODAY);
const curKey    = `${CUR_YEAR}-${CUR_MONTH}`;
const INSTALL_DISMISSED_KEY = "ll_pwa_install_dismissed";
const LOCAL_CACHE_KEY = "ll_cached_data_v1";
const getDaysLeft = () => DAYS_IN_MON - DAY_OF_MON;

// Allow logging back 2 months
const twoMonthsAgo = new Date(CUR_YEAR, CUR_MONTH - 2, 1);
const EARLIEST_LOG_DATE = localISO(twoMonthsAgo);

const fmtISO = iso => {
  const [y,m,d] = iso.split("-").map(Number);
  return new Date(y,m-1,d).toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"});
};

const getExpected = () => Math.ceil((MIN_TARGET/DAYS_IN_MON)*DAY_OF_MON);
const getStatus   = n => {
  const e = getExpected();
  const diff = n - e;
  const daysLeft = getDaysLeft();
  if (n + daysLeft < MIN_TARGET) return "cooked";
  if (diff >= 2) return "cruising";
  if (diff >= 0) return "on-track";
  if (diff >= -3) return "at-risk";
  return "behind";
};
const getDiff     = n => n - getExpected(); // positive = ahead, negative = behind
const diffLabel   = n => { const d=getDiff(n); return d>0?`+${d} ahead`:d<0?`${d} behind`:"on pace"; };
const lastWorkout = (userLogs) => {
  if(!userLogs||!userLogs.length) return null;
  const sorted=[...userLogs].sort((a,b)=>b.date.localeCompare(a.date));
  const last=sorted[0].date;
  const [y,m,d]=last.split("-").map(Number);
  const lastDate=new Date(y,m-1,d);
  const todayDate=new Date(CUR_YEAR,CUR_MONTH,DAY_OF_MON);
  const diff=Math.round((todayDate-lastDate)/(1000*60*60*24));
  if(diff===0) return "today";
  if(diff===1) return "1 day ago";
  return `${diff} days ago`;
};

function calcPenalties(activeCounts) {
  if(!activeCounts.length) return {winners:[],losers:[],perLoser:0,totalPot:0,perWinner:0};
  const sorted=[...activeCounts].sort((a,b)=>b.count-a.count);
  const topCount=sorted[0].count;
  if(topCount===0) return {winners:[],losers:[],perLoser:0,totalPot:0,perWinner:0};
  const winners=sorted.filter(u=>u.count===topCount);
  const losers=activeCounts.filter(u=>u.count<MIN_TARGET&&u.count<topCount);
  const n=losers.length;
  const perLoser=n===0?0:20+(n-1)*5;
  const totalPot=n*perLoser;
  const perWinner=winners.length>0&&totalPot>0?Math.floor(totalPot/winners.length):0;
  return {winners,losers,perLoser,totalPot,perWinner};
}

// ─── AUTO ROLLOVER ────────────────────────────────────────────────────────────
function checkRollover(data) {
  const { logs, excused, monthHistory, lastMonth } = data;
  // lastMonth stored as "year-month" string
  const expectedKey = curKey;
  if (!lastMonth || lastMonth === expectedKey) return null; // no rollover needed

  // Parse last stored month
  const [ly, lm] = lastMonth.split("-").map(Number);
  const lastDate = new Date(ly, lm, 1);
  const curDate  = new Date(CUR_YEAR, CUR_MONTH, 1);
  if (lastDate >= curDate) return null; // already current

  // Build snapshot of the previous month
  const prevYear  = ly;
  const prevMonth = lm;
  const prevKey   = `${prevYear}-${prevMonth}`;
  const label     = `${MONTH_NAMES[prevMonth]} '${String(prevYear).slice(2)}`;

  const counts  = Object.fromEntries(NAMES.map(n => [n, (logs[n]||[]).length]));
  const exc     = Object.fromEntries(NAMES.map(n => [n, excused[n]?.[prevKey]||false]));

  const snapshot = { key: prevKey, label, year: prevYear, month: prevMonth, counts, excused: exc };
  const newHistory = [...(monthHistory||[]), snapshot];

  // Clear current logs and excused for new month
  const newLogs    = {};
  const newExcused = {};

  return { logs: newLogs, excused: newExcused, monthHistory: newHistory, lastMonth: expectedKey };
}

// ─── JSONBIN ──────────────────────────────────────────────────────────────────
async function fetchData() {
  try {
    const res = await fetch("./api/lift-log", {
      cache: "no-store",
      headers: { "Accept":"application/json" }
    });
    if(!res.ok){ console.error("Fetch failed:", res.status, await res.text()); return null; }
    return await res.json();
  } catch(e){ console.error("Fetch error:", e); return null; }
}

async function saveData(data) {
  try {
    const res = await fetch("./api/lift-log", {
      method: "PUT",
      cache: "no-store",
      headers: { "Content-Type":"application/json" },
      body: JSON.stringify(data)
    });
    if(!res.ok){ console.error("Save failed:", res.status, await res.text()); return null; }
    console.log("Saved OK");
    return await res.json();
  } catch(e){ console.error("Save error:", e); }
  return null;
}

function readCachedData() {
  try {
    const raw = localStorage.getItem(LOCAL_CACHE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch {
    return null;
  }
}

function writeCachedData(data) {
  try {
    localStorage.setItem(LOCAL_CACHE_KEY, JSON.stringify(data));
  } catch {}
}

function getRevision(data) {
  return Number.isFinite(Number(data?.meta?.revision)) ? Number(data.meta.revision) : 0;
}

// ─── ATOMS ────────────────────────────────────────────────────────────────────
const { useState, useEffect, useMemo, useCallback, useRef } = React;

const isMobile = () => window.innerWidth <= 768;
const isStandalone = () => window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
const isIos = () => /iphone|ipad|ipod/i.test(window.navigator.userAgent);
const isSafari = () => /^((?!chrome|android).)*safari/i.test(window.navigator.userAgent);
const formatSyncTime = date => date
  ? date.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })
  : "";

const Avatar = ({name,size=32,muted=false}) => (
  React.createElement('div',{style:{width:size,height:size,borderRadius:"50%",background:muted?"var(--s3)":avatarColor(name),display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Outfit',sans-serif",fontWeight:800,fontSize:size*.38,color:muted?"var(--muted)":"#fff",flexShrink:0}},name[0])
);

const StatusBadge = ({status}) => {
  const map={
    "cruising":["rgba(91,141,239,.18)","var(--blue)"],
    "on-track":["var(--green-dim)","var(--green)"],
    "at-risk":["var(--amber-dim)","var(--amber)"],
    "behind":["rgba(232,69,69,.25)","var(--red)"],
    "cooked":["rgba(232,69,69,.35)","#ff8e8e"]
  };
  const [bg,fg]=map[status]||map.behind;
  const labels={"cruising":"Cruising","on-track":"On Track","at-risk":"At Risk","behind":"Behind","cooked":"Cooked"};
  return React.createElement('span',{style:{background:bg,color:fg,border:`1px solid ${fg}40`,padding:"2px 8px",borderRadius:4,fontSize:10,fontFamily:"'JetBrains Mono',monospace",fontWeight:700,letterSpacing:".05em",textTransform:"uppercase",whiteSpace:"nowrap"}},labels[status]);
};

const RankIcon = ({rank}) => {
  if(rank===1) return React.createElement('span',{style:{fontSize:15}},'🥇');
  if(rank===2) return React.createElement('span',{style:{fontSize:15}},'🥈');
  if(rank===3) return React.createElement('span',{style:{fontSize:15}},'🥉');
  return React.createElement('span',{className:"mono",style:{fontSize:11,color:"var(--muted)",minWidth:20,display:"inline-block",textAlign:"center"}},`#${rank}`);
};

const Bar = ({value,max,color="var(--green)",h=4}) => React.createElement('div',{style:{background:"var(--border)",borderRadius:99,height:h,overflow:"hidden",minWidth:0,flexShrink:0}},
  React.createElement('div',{style:{width:`${Math.min(100,max?Math.round(value/max*100):0)}%`,height:"100%",background:color,borderRadius:99,transition:"width .5s cubic-bezier(.4,0,.2,1)"}})
);

const Card = ({children,style={},className=""}) => React.createElement('div',{className:`card ${className}`,style},children);

const Spinner = ({label="Loading Lift Log..."}) => React.createElement('div',{style:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",gap:16}},
  React.createElement('div',{className:"spinner"}),
  React.createElement('div',{style:{color:"var(--muted)",fontSize:13,fontFamily:"'JetBrains Mono',monospace"}},label)
);

const InstallBanner = ({installReady,onInstall,onDismiss,showIosHint}) => (
  React.createElement('div',{className:"install-banner"},
    React.createElement('div',{className:"install-card pi"},
      React.createElement('div',{style:{display:"flex",alignItems:"center",gap:12}},
        React.createElement('div',{style:{width:42,height:42,borderRadius:12,background:"linear-gradient(135deg,#101820,#1fce65)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}},"🏋️"),
        React.createElement('div',null,
          React.createElement('div',{style:{fontWeight:800,fontSize:15}},"Install Lift Log"),
          React.createElement('div',{style:{fontSize:12,color:"var(--muted)",marginTop:3,lineHeight:1.45}},
            installReady
              ? "Add Lift Log to your home screen for a full-screen app experience and faster reloads."
              : "On iPhone, tap Share and choose Add to Home Screen to install Lift Log."
          )
        )
      ),
      React.createElement('div',{className:"install-actions"},
        installReady && React.createElement('button',{className:"install-btn primary",onClick:onInstall},"Install App"),
        showIosHint && React.createElement('button',{className:"install-btn secondary",onClick:onDismiss},"Hide Tip"),
        installReady && React.createElement('button',{className:"install-btn secondary",onClick:onDismiss},"Maybe Later")
      )
    )
  )
);

// ─── WHO ARE YOU ──────────────────────────────────────────────────────────────
const WhoAreYou = ({onSelect}) => (
  React.createElement('div',{style:{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"32px 18px",background:"var(--bg)",backgroundImage:"radial-gradient(ellipse 60% 38% at 50% 0%,#10103a50,transparent)"}},
    React.createElement('div',{className:"fu",style:{textAlign:"center",marginBottom:40}},
      React.createElement('span',{className:"mono",style:{fontSize:10,color:"var(--blue)",letterSpacing:".2em",textTransform:"uppercase"}},"Private · 8 Members"),
      React.createElement('div',{style:{fontFamily:"'Outfit',sans-serif",fontSize:56,fontWeight:900,lineHeight:.9,letterSpacing:"-.03em",margin:"14px 0"}},
        "LIFT",React.createElement('br'),React.createElement('span',{style:{color:"var(--green)"}},"LOG")
      ),
      React.createElement('div',{style:{color:"var(--muted)",fontSize:16,fontWeight:500}},"Who are you?")
    ),
    React.createElement('div',{className:"fu2",style:{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10,width:"100%",maxWidth:400}},
      NAMES.map((name,i)=>React.createElement('button',{key:name,onClick:()=>onSelect(name),
        style:{background:"var(--s2)",border:"1px solid var(--border2)",borderRadius:13,padding:"16px",display:"flex",alignItems:"center",gap:12,textAlign:"left",animation:`fadeUp .35s ${i*.04}s ease both`,minHeight:64},
        onMouseEnter:e=>{e.currentTarget.style.borderColor=avatarColor(name);e.currentTarget.style.background="var(--s3)"},
        onMouseLeave:e=>{e.currentTarget.style.borderColor="var(--border2)";e.currentTarget.style.background="var(--s2)"}},
        React.createElement(Avatar,{name,size:38}),
        React.createElement('span',{style:{fontWeight:700,fontSize:16,color:"var(--text)"}},name)
      ))
    )
  )
);

// ─── LOG MODAL ────────────────────────────────────────────────────────────────
const LogModal = ({user,logs,onConfirm,onClose}) => {
  const [step,setStep]=useState(1);
  const [wType,setWType]=useState(null);
  const [selDate,setSelDate]=useState(TODAY_ISO);
  const loggedISO=useMemo(()=>{const s=new Set();(logs[user]||[]).forEach(l=>s.add(l.date));return s;},[logs,user]);
  const alreadyLogged=loggedISO.has(selDate);
  const canProceed=!!wType&&!alreadyLogged;

  if(step===2) return React.createElement('div',{className:"overlay",onClick:onClose},
    React.createElement('div',{className:"modal pi",onClick:e=>e.stopPropagation(),style:{textAlign:"center"}},
      React.createElement('div',{style:{fontSize:48,marginBottom:10}},WORKOUT_ICONS[wType]),
      React.createElement('div',{style:{fontWeight:800,fontSize:21,marginBottom:14}},"Locking this in?"),
      React.createElement('div',{style:{background:"var(--s2)",border:"1px solid var(--border)",borderRadius:10,padding:"12px 16px",marginBottom:8,display:"inline-flex",flexDirection:"column",gap:4,textAlign:"left"}},
        React.createElement('span',{style:{fontWeight:700,fontSize:15}},`${WORKOUT_ICONS[wType]} ${wType}`),
        React.createElement('span',{className:"mono",style:{fontSize:12,color:"var(--muted)"}},`${fmtISO(selDate)} · ${user}`)
      ),
      React.createElement('div',{style:{color:"var(--muted)",fontSize:13,marginBottom:24}},"You can delete this from your calendar if needed."),
      React.createElement('div',{style:{display:"flex",gap:9}},
        React.createElement('button',{onClick:()=>setStep(1),style:{flex:1,background:"var(--s2)",border:"1px solid var(--border)",color:"var(--muted)",padding:"14px",borderRadius:10,fontSize:15,fontWeight:600}},"← Back"),
        React.createElement('button',{onClick:()=>onConfirm(wType,selDate),style:{flex:2,background:"var(--green)",color:"#000",padding:"14px",borderRadius:10,fontSize:15,fontWeight:800}},"✓ Lock It In")
      )
    )
  );

  return React.createElement('div',{className:"overlay",onClick:onClose},
    React.createElement('div',{className:"modal pi",onClick:e=>e.stopPropagation()},
      React.createElement('div',{style:{fontWeight:800,fontSize:20,marginBottom:4}},"Log a workout"),
      React.createElement('div',{style:{color:"var(--muted)",fontSize:14,marginBottom:18}},"Choose the date and type."),

const MonthPage = ({logs,excused,monthHistory}) => {
  const [selIdx,setSelIdx]=useState(null); // null = current month
  const [viewPlayer,setViewPlayer]=useState(null);

  const isCurrent=selIdx===null;
  const histReversed=[...monthHistory].reverse();
  const selMonth=isCurrent?null:histReversed[selIdx];

  const counts=isCurrent
    ? NAMES.map(n=>({name:n,count:(logs[n]||[]).length,isOut:excused[n]?.[curKey]||false}))
    : NAMES.map(n=>({name:n,count:selMonth.counts[n]||0,isOut:selMonth.excused?.[n]||false}));

  const activeCounts=counts.filter(u=>!u.isOut);
  const sorted=[...counts].sort((a,b)=>{if(a.isOut&&!b.isOut)return 1;if(!a.isOut&&b.isOut)return -1;return b.count-a.count;});
  const {winners,losers,perLoser,totalPot,perWinner}=calcPenalties(activeCounts);
  const hasActivity=activeCounts.some(u=>u.count>0);
  // At Risk = active, not a loser, not a winner, and currently tagged at-risk.
  const atRisk=isCurrent?activeCounts.filter(u=>{
    const isWinner=winners.find(w=>w.name===u.name);
    const isLoser=losers.find(l=>l.name===u.name);
    return !isWinner&&!isLoser&&getStatus(u.count)==="at-risk";
  }):[];

  const monthLabel=isCurrent?`${MONTH_NAMES[CUR_MONTH]} ${CUR_YEAR}`:selMonth.label;

    style:{background:"var(--s2)",border:"1px solid var(--border)",borderRadius:8,color:"var(--text)",padding:"8px 12px",fontSize:13,fontFamily:"'JetBrains Mono',monospace",outline:"none",cursor:"pointer"}},

  if(viewPlayer) return React.createElement('div',{style:{maxWidth:740,margin:"0 auto"}},
    React.createElement(PlayerProfile,{name:viewPlayer,logs,excused,monthHistory,onBack:()=>setViewPlayer(null)})
  );

  const renderStandings=()=>React.createElement(Card,{style:{overflow:"hidden"}},
    React.createElement('div',{style:{padding:"11px 15px",borderBottom:"1px solid var(--border)",fontWeight:800,fontSize:14}},isCurrent?"Full Standings":"Final Standings"),
    sorted.map((u,i)=>{
      const activeOnly=sorted.filter(x=>!x.isOut);
      const aRank=activeOnly.findIndex(x=>x.name===u.name);

// ─── ROOT ─────────────────────────────────────────────────────────────────────
const App = () => {
  const [user,setUser]=useState(()=>{try{return localStorage.getItem("ll_user")||null;}catch{return null;}});
  const [page,setPage]=useState("today");
  const [loading,setLoading]=useState(()=>!readCachedData());
  const [saving,setSaving]=useState(false);
  const [logs,setLogs]=useState(()=>readCachedData()?.logs||{});
  const [excused,setExcused]=useState(()=>readCachedData()?.excused||{});
  const [monthHistory,setMonthHistory]=useState(()=>readCachedData()?.monthHistory||[]);
  const [installPrompt,setInstallPrompt]=useState(null);
  const [installDismissed,setInstallDismissed]=useState(()=>{try{return localStorage.getItem(INSTALL_DISMISSED_KEY)==="1";}catch{return false;}});
  const [standalone,setStandalone]=useState(()=>isStandalone());
  const [syncing,setSyncing]=useState(false);
  const [syncError,setSyncError]=useState(false);
  const [lastSyncedAt,setLastSyncedAt]=useState(null);
  const [showJustSynced,setShowJustSynced]=useState(false);
  const [isMobileView,setIsMobileView]=useState(()=>isMobile());
  const latestRevisionRef = useRef(getRevision(readCachedData()));
  const justSyncedTimerRef = useRef(null);

  useEffect(()=>{
    if(!("serviceWorker" in navigator)) return;
    navigator.serviceWorker.register("./sw.js").catch(err=>console.error("Service worker registration failed", err));
  },[]);

  useEffect(()=>{
    const syncViewport = () => setIsMobileView(isMobile());
    window.addEventListener("resize", syncViewport);
    return () => window.removeEventListener("resize", syncViewport);
  },[]);

  const applyData = useCallback((data, persistRemoteRollover=false) => {
    if(!data) return false;
    const rolled = checkRollover(data);
    const resolved = rolled
      ? { ...data, ...rolled, lastMonth: curKey }
      : {
          logs: data.logs || {},
          excused: data.excused || {},
          monthHistory: data.monthHistory || [],
          lastMonth: data.lastMonth || curKey,
          meta: data.meta || { revision: 0, updatedAt: null }
        };
    const incomingRevision = getRevision(resolved);
    if (incomingRevision < latestRevisionRef.current) return false;
    latestRevisionRef.current = incomingRevision;
    setLogs(resolved.logs || {});
    setExcused(resolved.excused || {});
    setMonthHistory(resolved.monthHistory || []);
    writeCachedData(resolved);
    if(rolled && persistRemoteRollover) saveData(resolved);
    return true;
  },[]);

  const flashJustSynced = useCallback(() => {
    setShowJustSynced(true);
    if (justSyncedTimerRef.current) clearTimeout(justSyncedTimerRef.current);
    justSyncedTimerRef.current = setTimeout(() => setShowJustSynced(false), 2500);
  },[]);

  const refreshNow = useCallback(async () => {
    setSyncing(true);
    setSyncError(false);
    try {
      const data = await fetchData();
      if(data){
        const applied = applyData(data, true);
        setLastSyncedAt(new Date());
        flashJustSynced();
        if (!applied) setSyncError(false);
      } else {
        setSyncError(true);
      }
    } finally {
      setLoading(false);
      setSyncing(false);
    }
  },[applyData, flashJustSynced]);

  useEffect(()=>{
    const syncStandalone = () => setStandalone(isStandalone());
    const handleBeforeInstallPrompt = event => {
      event.preventDefault();
      setInstallPrompt(event);
      setInstallDismissed(false);
      try { localStorage.removeItem(INSTALL_DISMISSED_KEY); } catch {}
    };
    const handleInstalled = () => {
      setInstallPrompt(null);
      setStandalone(true);
      setInstallDismissed(true);
      try { localStorage.setItem(INSTALL_DISMISSED_KEY, "1"); } catch {}
    };

    window.addEventListener("beforeinstallprompt", handleBeforeInstallPrompt);
    window.addEventListener("appinstalled", handleInstalled);
    window.addEventListener("resize", syncStandalone);
    syncStandalone();

    return () => {
      window.removeEventListener("beforeinstallprompt", handleBeforeInstallPrompt);
      window.removeEventListener("appinstalled", handleInstalled);
      window.removeEventListener("resize", syncStandalone);
    };
  },[]);

  useEffect(()=>{
    const cached = readCachedData();
    if(cached){
      applyData(cached);
      setLoading(false);
    }

    refreshNow();
    // Refresh every 10 seconds to keep multiple active users closely in sync.
    const interval = setInterval(()=>{
      fetchData().then(data=>{
        if(data){
          const applied = applyData(data, true);
          if (applied) {
            setLastSyncedAt(new Date());
            setSyncError(false);
          }
        } else {
          setSyncError(true);
        }
      }).catch(()=>setSyncError(true));
    }, 10000);
    const handleVisibility = () => {
      if (document.visibilityState === "visible") refreshNow();
    };
    const handleFocus = () => refreshNow();
    document.addEventListener("visibilitychange", handleVisibility);
    window.addEventListener("focus", handleFocus);
    return ()=>{
      clearInterval(interval);
      document.removeEventListener("visibilitychange", handleVisibility);
      window.removeEventListener("focus", handleFocus);
    };
  },[applyData, refreshNow]);

  useEffect(()=>()=>{ if (justSyncedTimerRef.current) clearTimeout(justSyncedTimerRef.current); },[]);

  const handleSave=useCallback(async(newData)=>{
    const payload = {...newData,lastMonth:curKey};
    writeCachedData(payload);
    setSaving(true);
    try{
      const saved = await saveData(payload);
      if(saved){
        const applied = applyData(saved, false);
        if (applied) {
          setLastSyncedAt(new Date());
          setSyncError(false);
        }
      } else {
        setSyncError(true);
      }
    }catch(e){
      console.error("Save failed",e);
      setSyncError(true);
    }
    setSaving(false);
  },[applyData]);

  const selectUser=name=>{try{localStorage.setItem("ll_user",name);}catch{}setUser(name);};
  const handleSwitch=()=>{try{localStorage.removeItem("ll_user");}catch{}setUser(null);};
  const dismissInstall = () => {
    setInstallDismissed(true);
    try { localStorage.setItem(INSTALL_DISMISSED_KEY, "1"); } catch {}
  };
  const installApp = async () => {
    if(!installPrompt) return;
    try {
      await installPrompt.prompt();
      await installPrompt.userChoice;
    } catch (e) {
      console.error("Install prompt failed", e);
    } finally {
      setInstallPrompt(null);
    }
  };
  const showIosHint = !standalone && !installDismissed && isIos() && isSafari() && !installPrompt;
  const showInstallBanner = !standalone && !installDismissed && (Boolean(installPrompt) || showIosHint);

  if(loading) return React.createElement(Spinner,{label:"Opening Lift Log..."});
  if(!user) return React.createElement(WhoAreYou,{onSelect:selectUser});

  return React.createElement(React.Fragment,null,
    React.createElement(Nav,{page,setPage,user,onSwitch:handleSwitch,syncing,lastSyncedAt,syncError,onRefresh:refreshNow,showJustSynced}),
    React.createElement('div',{style:{paddingBottom:isMobileView?"calc(86px + env(safe-area-inset-bottom))":0}},
      page==="today"  &&React.createElement(TodayPage,  {user,logs,setLogs,excused,setExcused,monthHistory,saving,onSave:handleSave}),
      page==="month"  &&React.createElement(MonthPage,  {logs,excused,monthHistory}),
      page==="history"&&React.createElement(HistoryPage,{logs,excused,monthHistory})
    ),
    showInstallBanner && React.createElement(InstallBanner,{
      installReady:Boolean(installPrompt),
      onInstall:installApp,
      onDismiss:dismissInstall,
      showIosHint
    })
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
